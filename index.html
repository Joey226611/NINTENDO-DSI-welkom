<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Welkom!</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: #000;
    font-family: Arial, sans-serif;
    text-align: center;
    overflow: hidden;
}

/* achtergrond glow sfeer */
.bg-glow {
    position: absolute;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at center, rgba(0,255,255,0.08), transparent 60%);
}

/* titel */
h1 {
    margin-top: 18%;
    font-size: 64px;
    color: #fff;
    text-shadow:
        0 0 6px #00ffff,
        0 0 12px #ff00ff,
        0 0 20px #00ffff;
}

/* subtitel */
p {
    color: #888;
    margin-top: -10px;
    font-size: 16px;
}

/* 🔘 NEON BUTTON */
.button {
    display: inline-block;
    margin-top: 50px;
    padding: 14px 40px;
    font-size: 18px;
    color: #fff;
    text-decoration: none;
    border: 2px solid #00ffff;
    border-radius: 6px;
    background: rgba(0,0,0,0.4);
    box-shadow:
        0 0 10px #00ffff,
        0 0 20px #ff00ff inset;
}

/* hover effect (werkt op 3DS soms beperkt maar ok) */
.button:active {
    background: rgba(0,255,255,0.1);
    box-shadow:
        0 0 15px #00ffff,
        0 0 25px #ff00ff inset;
}

/* kleine neon decor lijnen */
.line {
    position: absolute;
    width: 100%;
    height: 1px;
    background: rgba(0,255,255,0.2);
    top: 30%;
}

.line2 {
    top: 65%;
    background: rgba(255,0,255,0.2);
}
</style>

</head>

<body>

<div class="bg-glow"></div>

<div class="line"></div>
<div class="line line2"></div>

<h1>Welkom!</h1>
<p>Neon Futuristic 3DS Experience</p>

<a class="button" href="#">START ▶</a>

</body>
</html>
