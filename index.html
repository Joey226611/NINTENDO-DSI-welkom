<!DOCTYPE html>
<html style="background:#000;">
<head>
<meta charset="UTF-8">
<title>Welkom!</title>

<style>
/* 🔥 FORCE EVERYTHING BLACK */
html {
    background: #000000;
}

body {
    margin: 0;
    padding: 0;
    background: #000000;
    color: #ffffff;
    font-family: Arial, sans-serif;
    text-align: center;
}

/* extra black layer tegen 3DS grijze randen */
.blackfix {
    position: fixed;
    top: -1000px;
    left: -1000px;
    right: -1000px;
    bottom: -1000px;
    background: #000;
    z-index: -1;
}

/* main neon text */
h1 {
    margin-top: 130px;
    font-size: 78px;
    color: #fff;
    letter-spacing: 2px;

    text-shadow:
        0 0 6px #00ffff,
        0 0 12px #ff00ff,
        0 0 22px #00ffff,
        0 0 32px #ff00ff;
}

/* neon bars boven en onder */
.bar {
    width: 100%;
    height: 2px;
    background: #00ffff;
    box-shadow: 0 0 10px #00ffff;
    margin-top: 60px;
}

.bar2 {
    background: #ff00ff;
    box-shadow: 0 0 10px #ff00ff;
    margin-top: 60px;
}

/* subtitle */
p {
    color: #888;
    font-size: 14px;
    margin-top: 20px;
}
</style>
</head>

<body>

<div class="blackfix"></div>

<div class="bar"></div>

<h1>Welkom!</h1>

<div class="bar bar2"></div>

<p>Futuristic Neon Interface</p>

</body>
</html>
