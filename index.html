<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<!-- 🔥 BELANGRIJK voor DSi scaling -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Welkom!</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: #000;
    font-family: Arial;
    text-align: center;
}

/* FIX: grotere schaal voor DSi */
.wrapper {
    width: 100%;
    height: 100%;
}

/* grotere tekst zodat DSi niet tiny rendert */
h1 {
    margin-top: 35%;
    font-size: 72px; /* groter dan eerst */
    color: #fff;
    text-shadow:
        0 0 5px #00ffff,
        0 0 10px #ff00ff;
}

/* simpele neon bars */
.bar {
    position: absolute;
    left: 0;
    width: 100%;
    height: 2px;
    background: #00ffff;
    top: 25%;
}

.bar2 {
    top: 55%;
    background: #ff00ff;
}

.bar3 {
    top: 75%;
    background: #00ffff;
}
</style>

</head>

<body>

<div class="wrapper">

<div class="bar"></div>
<div class="bar bar2"></div>
<div class="bar bar3"></div>

<h1>Welkom!</h1>

</div>

</body>
</html>
