<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Welkom!</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: #000;
    font-family: Arial;
    text-align: center;
}

/* simpele glow achtergrond (geen radial!) */
.bg {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #000;
}

/* MAIN TEXT */
h1 {
    margin-top: 120px;
    font-size: 72px;
    color: #fff;
    text-shadow:
        0 0 6px #00ffff,
        0 0 12px #ff00ff,
        0 0 20px #00ffff;
}

/* subtitle */
p {
    color: #777;
    font-size: 14px;
    margin-top: -10px;
}

/* 🔥 LINE GLOW (geen circles = geen box glitch) */
.glow-line {
    width: 80%;
    height: 2px;
    margin: 20px auto;
    background: #00ffff;
    box-shadow: 0 0 10px #00ffff;
}

.glow-line2 {
    background: #ff00ff;
    box-shadow: 0 0 10px #ff00ff;
}

/* top & bottom accents */
.topbar, .bottombar {
    width: 100%;
    height: 1px;
    background: rgba(0,255,255,0.2);
    position: absolute;
    left: 0;
}

.topbar { top: 40px; }
.bottombar { bottom: 40px; background: rgba(255,0,255,0.15); }
</style>

</head>

<body>

<div class="bg"></div>

<div class="topbar"></div>
<div class="bottombar"></div>

<h1>Welkom!</h1>

<div class="glow-line"></div>
<div class="glow-line2 glow-line"></div>

<p>Futuristic Neon Interface</p>

</body>
</html>
