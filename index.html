<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Welkom!</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: #000;
    font-family: Arial, sans-serif;
    text-align: center;
    overflow: hidden;
}

/* zachte futuristische glow achtergrond */
.bg {
    position: absolute;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at center, rgba(0,255,255,0.10), transparent 55%);
}

/* centreren van alles */
.center {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 100%;
    transform: translate(-50%, -50%);
}

/* 🌟 MAIN TEXT */
h1 {
    font-size: 78px;
    color: #fff;
    margin: 0;

    /* neon glow stack */
    text-shadow:
        0 0 6px #00ffff,
        0 0 12px #ff00ff,
        0 0 18px #00ffff,
        0 0 30px #ff00ff;
}

/* kleine subtitle vibe */
p {
    color: #777;
    margin-top: 10px;
    font-size: 14px;
}

/* 🔥 glow ring rond tekst */
.ring {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 260px;
    height: 260px;
    margin-left: -130px;
    margin-top: -130px;

    border: 2px solid rgba(0,255,255,0.25);
    border-radius: 50%;

    box-shadow:
        0 0 20px rgba(0,255,255,0.2),
        0 0 40px rgba(255,0,255,0.15);
}

/* tweede inner ring */
.ring2 {
    width: 340px;
    height: 340px;
    margin-left: -170px;
    margin-top: -170px;
    border: 1px solid rgba(255,0,255,0.15);
}

/* subtiele scan lines */
.line {
    position: absolute;
    width: 100%;
    height: 1px;
    background: rgba(0,255,255,0.15);
    top: 35%;
}

.line2 {
    top: 65%;
    background: rgba(255,0,255,0.12);
}
</style>

</head>

<body>

<div class="bg"></div>

<div class="line"></div>
<div class="line line2"></div>

<!-- glow rings -->
<div class="ring"></div>
<div class="ring ring2"></div>

<!-- text center -->
<div class="center">
    <h1>Welkom!</h1>
    <p>Futuristic Neon Interface</p>
</div>

</body>
</html>
