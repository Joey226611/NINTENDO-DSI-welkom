<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Welkom!</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: #000;
    font-family: Arial, sans-serif;
    text-align: center;
}

/* simpele neon tekst zonder animatie */
h1 {
    margin-top: 30%;
    font-size: 48px;
    color: #fff;
    text-shadow:
        0 0 5px #00ffff,
        0 0 10px #ff00ff;
}

/* simpele statische lijnen (geen animatie) */
.line {
    position: absolute;
    left: 0;
    width: 100%;
    height: 1px;
    background: #00ffff;
    top: 30%;
    opacity: 0.4;
}

.line2 {
    top: 50%;
    background: #ff00ff;
}

.line3 {
    top: 70%;
    background: #00ffff;
    opacity: 0.3;
}
</style>

</head>

<body>

<div class="line"></div>
<div class="line line2"></div>
<div class="line line3"></div>

<h1>Welkom!</h1>

</body>
</html>
